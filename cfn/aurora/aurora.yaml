AWSTemplateFormatVersion: '2010-09-09'

Description: Creates a aurora mysql instance

Parameters:

  Environment:
    Type: String
    Description: Environment name used for tagging resources.
    Default: dev
    AllowedValues:
      - dev
      - test
      - qa
      - prod

  ProjectName:
    Type: String
    Description: Project name used as a prefix for resources.
    Default: aws-dms-lab
    MinLength: 3
    MaxLength: 30
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: Project name can contain only letters, numbers, and hyphens.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where Aurora will be deployed.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two subnets in different Availability Zones.

  AllowedCIDR:
    Type: String
    Description: CIDR block allowed to connect to Aurora on port 3306.
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: Must be a valid IPv4 CIDR block (for example 203.0.113.10/32).

  EngineVersion:
    Type: String
    Description: Aurora MySQL engine version.
    Default: 8.4.mysql_aurora.8.4.7

  DBName:
    Type: String
    Description: Initial database name.
    Default: company
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: Must start with a letter and contain only letters, numbers, and underscores.

  DBPort:
    Type: Number
    Description: Database listener port.
    Default: 3306
    MinValue: 1150
    MaxValue: 65535
  
  MasterUsername:
    Type: String
    Description: Aurora master username.
    Default: admin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: Must start with a letter and contain only letters, numbers, and underscores.

  MasterPassword:
    Type: String
    Description: Aurora master password.
    NoEcho: true
    MinLength: 12
    MaxLength: 128
    AllowedPattern: '^[ -~]+$'
    ConstraintDescription: Must contain only printable ASCII characters.

  DBInstanceClass:
    Type: String
    Description: Aurora instance class.
    Default: db.t4g.medium
    AllowedValues:
      - db.t4g.medium
      - db.t4g.large
      - db.r6g.large
      - db.r6g.xlarge

  BackupRetentionPeriod:
    Type: Number
    Description: Number of days to retain automated backups.
    Default: 1
    MinValue: 1
    MaxValue: 35

  DeletionProtection:
    Type: String
    Description: Enable deletion protection.
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  EnablePerformanceInsights:
    Type: String
    Description: Enable Performance Insights on the writer instance.
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  MonitoringInterval:
    Type: Number
    Description: Enhanced Monitoring interval in seconds.
    Default: 60
    AllowedValues:
      - 0
      - 1
      - 5
      - 10
      - 15
      - 30
      - 60
  
  PubliclyAccessible:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Conditions:

  EnableDeletionProtectionCondition: !Equals
    - !Ref DeletionProtection
    - "true"

  EnablePerformanceInsightsCondition: !Equals
    - !Ref EnablePerformanceInsights
    - "true"

  PublicAccessCondition: !Equals
    - !Ref PubliclyAccessible
    - "true"
  
  EnhancedMonitoringEnabled: !Not
    - !Equals
      - !Ref MonitoringInterval
      - 0

Resources:

  #################################################
  # Security Group
  #################################################
  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Aurora MySQL
      GroupName: !Sub "${ProjectName}-${Environment}-aurora-sg"
      VpcId: !Ref VpcId
      # Tags:
      #   - Key: Name
      #     Value: !Sub "${ProjectName}-${Environment}-aurora-sg"
      #   - Key: Project
      #     Value: !Ref ProjectName
      #   - Key: Environment
      #     Value: !Ref Environment
      #   - Key: ManagedBy
      #     Value: CloudFormation

  #################################################
  # Security Group Ingress
  #################################################
  AuroraMySQLIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      Description: Allow MySQL access
      IpProtocol: tcp
      FromPort: !Ref DBPort
      ToPort: !Ref DBPort
      CidrIp: !Ref AllowedCIDR
  
  #################################################
  # DB Subnet Group
  #################################################
  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "${ProjectName}-${Environment}-aurora-subnet-group"
      DBSubnetGroupDescription: Aurora MySQL DB Subnet Group
      SubnetIds: !Ref SubnetIds
      # Tags:
      #   - Key: Name
      #     Value: !Sub "${ProjectName}-${Environment}-aurora-subnet-group"
      #   - Key: Project
      #     Value: !Ref ProjectName
      #   - Key: Environment
      #     Value: !Ref Environment
      #   - Key: ManagedBy
      #     Value: CloudFormation
  
  #################################################
  # Aurora Cluster Parameter Group
  #################################################
  AuroraClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: !Sub "${ProjectName} ${Environment} Aurora MySQL 8.4 Cluster Parameter Group"
      Family: aurora-mysql8.4
      Parameters:
        #############################################
        # General
        #############################################
        time_zone: UTC
        character_set_server: utf8mb4
        collation_server: utf8mb4_0900_ai_ci
        #############################################
        # Audit
        #############################################
        server_audit_logging: "1"
        server_audit_events: "CONNECT,QUERY_DDL,QUERY_DML"
        server_audit_logs_upload: "1"
      # Tags:
      #   - Key: Name
      #     Value: !Sub "${ProjectName}-${Environment}-cluster-pg"
      #   - Key: Project
      #     Value: !Ref ProjectName
      #   - Key: Environment
      #     Value: !Ref Environment
      #   - Key: ManagedBy
      #     Value: CloudFormation

  #################################################
  # Aurora Instance Parameter Group
  #################################################
  AuroraInstanceParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: !Sub "${ProjectName} ${Environment} Aurora MySQL 8.4 Instance Parameter Group"
      Family: aurora-mysql8.4
      Parameters:
        #############################################
        # Logging
        #############################################
        general_log: "1"
        slow_query_log: "1"
        log_output: FILE
        #############################################
        # Slow Query Log
        #############################################
        long_query_time: "1"
      # Tags:
      #   - Key: Name
      #     Value: !Sub "${ProjectName}-${Environment}-instance-pg"
      #   - Key: Project
      #     Value: !Ref ProjectName
      #   - Key: Environment
      #     Value: !Ref Environment
      #   - Key: ManagedBy
      #     Value: CloudFormation
  
  #################################################
  # Aurora MySQL Cluster
  #################################################
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      #################################################
      # Engine
      #################################################
      Engine: aurora-mysql
      EngineVersion: !Ref EngineVersion
      #################################################
      # Database
      #################################################
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterPassword
      Port: !Ref DBPort
      #################################################
      # Networking
      #################################################
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroup
      NetworkType: IPV4
      #################################################
      # Parameter Groups
      #################################################
      DBClusterParameterGroupName: !Ref AuroraClusterParameterGroup
      #################################################
      # Backup
      #################################################
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      CopyTagsToSnapshot: true
      StorageEncrypted: true
      #################################################
      # CloudWatch Logs
      #################################################
      EnableCloudwatchLogsExports:
        - audit
        - error
        - general
        - slowquery
      #################################################
      # Protection
      #################################################
      DeletionProtection: !If
        - EnableDeletionProtectionCondition
        - true
        - false
      #################################################
      # Tags
      #################################################
      # Tags:
      #   - Key: Name
      #     Value: !Sub "${ProjectName}-${Environment}-cluster"
      #   - Key: Project
      #     Value: !Ref ProjectName
      #   - Key: Environment
      #     Value: !Ref Environment
      #   - Key: ManagedBy
      #     Value: CloudFormation

  #################################################
  # Aurora Writer Instance
  #################################################
  AuroraWriterInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      #################################################
      # Engine
      #################################################
      Engine: aurora-mysql
      EngineVersion: !Ref EngineVersion
      DBClusterIdentifier: !Ref AuroraCluster
      #################################################
      # Instance
      #################################################
      DBInstanceClass: !Ref DBInstanceClass
      PubliclyAccessible: !If
        - PublicAccessCondition
        - true
        - false
      #################################################
      # Parameter Group
      #################################################
      DBParameterGroupName: !Ref AuroraInstanceParameterGroup
      #################################################
      # Monitoring
      #################################################
      EnablePerformanceInsights: !If
        - EnablePerformanceInsightsCondition
        - true
        - false
      MonitoringInterval: !Ref MonitoringInterval
      MonitoringRoleArn: !If
        - EnhancedMonitoringEnabled
        - !GetAtt RDSEnhancedMonitoringRole.Arn
        - !Ref AWS::NoValue
      #################################################
      # Tags
      #################################################
      # Tags:
      #   - Key: Name
      #     Value: !Sub "${ProjectName}-${Environment}-writer"
      #   - Key: Project
      #     Value: !Ref ProjectName
      #   - Key: Environment
      #     Value: !Ref Environment
      #   - Key: ManagedBy
      #     Value: CloudFormation

  #################################################
  # RDS Enhanced Monitoring IAM Role
  #################################################
  RDSEnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-rds-monitoring-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole
      # Tags:
      #   - Key: Name
      #     Value: !Sub "${ProjectName}-${Environment}-rds-monitoring-role"
      #   - Key: Project
      #     Value: !Ref ProjectName
      #   - Key: Environment
      #     Value: !Ref Environment
      #   - Key: ManagedBy
      #     Value: CloudFormation

#################################################
# Outputs
#################################################

Outputs:
  #################################################
  # Connection
  #################################################

  ClusterEndpoint:
    Description: Aurora cluster endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ClusterEndpoint"

  ReaderEndpoint:
    Description: Aurora reader endpoint
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ReaderEndpoint"

  WriterEndpoint:
    Description: Aurora writer endpoint
    Value: !GetAtt AuroraWriterInstance.Endpoint.Address
    Export:
      Name: !Sub "${ProjectName}-${Environment}-WriterEndpoint"

  Port:
    Description: Aurora database port
    Value: !Ref DBPort
    Export:
      Name: !Sub "${ProjectName}-${Environment}-Port"

  #################################################
  # Infrastructure
  #################################################

  ClusterArn:
    Description: Aurora cluster ARN
    Value: !GetAtt AuroraCluster.DBClusterArn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ClusterArn"

  ClusterResourceId:
    Description: Aurora Cluster Resource ID
    Value: !GetAtt AuroraCluster.DbClusterResourceId
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ClusterResourceId"
  
  WriterInstanceIdentifier:
    Value: !Ref AuroraWriterInstance
    Export:
      Name: !Sub "${ProjectName}-${Environment}-WriterInstanceIdentifier"

  ClusterIdentifier:
    Value: !Ref AuroraCluster
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ClusterIdentifier"

  SecurityGroupId:
    Description: Aurora Security Group
    Value: !Ref AuroraSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-SecurityGroupId"

  SubnetGroup:
    Description: Aurora DB Subnet Group
    Value: !Ref AuroraSubnetGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-SubnetGroup"

  ClusterParameterGroup:
    Description: Cluster Parameter Group
    Value: !Ref AuroraClusterParameterGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ClusterParameterGroup"

  InstanceParameterGroup:
    Description: Instance Parameter Group
    Value: !Ref AuroraInstanceParameterGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-InstanceParameterGroup"

  #################################################
  # Database
  #################################################

  DatabaseName:
    Description: Initial database name
    Value: !Ref DBName
    Export:
      Name: !Sub "${ProjectName}-${Environment}-DatabaseName"